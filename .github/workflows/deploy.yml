name: Deploy JupyterLite to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install JupyterLite
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate and normalize notebooks
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import nbformat

          for path in Path("content").glob("*.ipynb"):
              print(f"Checking {path}")

              text = path.read_text(encoding="utf-8")
              data = json.loads(text)

              # Repair notebooks that were accidentally saved as a JSON string
              # containing notebook JSON, instead of as a notebook JSON object.
              if isinstance(data, str):
                  print(f"  Double-encoded notebook detected; repairing {path}")
                  data = json.loads(data)

              if not isinstance(data, dict):
                  raise TypeError(f"{path} is not a valid notebook JSON object")

              nb = nbformat.from_dict(data)

              if nb.get("nbformat", 4) != 4:
                  nb = nbformat.convert(nb, 4)

              nb.metadata.setdefault("kernelspec", {
                  "display_name": "Python (Pyodide)",
                  "language": "python",
                  "name": "python"
              })

              nb.metadata.setdefault("language_info", {
                  "name": "python",
                  "pygments_lexer": "ipython3",
                  "codemirror_mode": {"name": "ipython", "version": 3},
                  "file_extension": ".py",
                  "mimetype": "text/x-python"
              })

              nbformat.validate(nb)
              nbformat.write(nb, str(path))

          print("All notebooks validated and normalized.")
          PY

      - name: Build JupyterLite site
        run: |
          jupyter lite build --contents content --output-dir dist

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
