name: Deploy JupyterLite to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install JupyterLite
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Validate and normalize notebooks
        run: |
          python - <<'PY'
          from pathlib import Path
          import nbformat

          for path in Path("content").glob("*.ipynb"):
              print(f"Checking {path}")
              nb = nbformat.read(path, as_version=4)

              if "metadata" not in nb or nb.metadata is None:
                  nb.metadata = {}

              nb.metadata.setdefault("kernelspec", {
                  "display_name": "Python (Pyodide)",
                  "language": "python",
                  "name": "python"
              })

              nb.metadata.setdefault("language_info", {
                  "name": "python",
                  "pygments_lexer": "ipython3",
                  "codemirror_mode": {"name": "ipython", "version": 3},
                  "file_extension": ".py",
                  "mimetype": "text/x-python"
              })

              nbformat.validate(nb)
              nbformat.write(nb, path)
          PY
          
      - name: Build JupyterLite site
        run: |
          jupyter lite build --contents content --output-dir dist

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
